<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="cookies.js"></script>
<script src="chat.js"></script>
<script>
  function renderCart() {
    const cart = getCart();
    const root = document.getElementById('cart-root');

    if (cart.length === 0) {
      root.innerHTML = `
        <div style="grid-column: 1/-1;">
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h3>Tu carrito está vacío</h3>
            <p>Explora el marketplace para encontrar productos increíbles.</p>
            <a href="explorar.html" class="btn btn-primary" style="margin-top: 1.5rem;">Explorar productos</a>
          </div>
        </div>
      `;
      return;
    }

    const items = cart.map(p => `
        <div class="cart-item">
          <div class="cart-item-img">${p.icon}</div>
          <div>
            <div class="cart-item-name">${p.title}</div>
            <div class="cart-item-meta">${p.category} · ${p.seller} · ${p.university}</div>
            <button class="remove-btn" onclick="removeFromCart('${p.id}')" style="margin-top: 0.4rem;">Eliminar</button>
          </div>
          <div class="cart-item-actions">
            <div class="qty-control">
              <button onclick="updateCartQty('${p.id}', ${p.qty - 1})">−</button>
              <span class="qty-value">${p.qty}</span>
              <button onclick="updateCartQty('${p.id}', ${p.qty + 1})">+</button>
            </div>
            <div class="cart-item-price">${fmt(p.price * p.qty)}</div>
          </div>
        </div>
    `).join('');

    const subtotal = cart.reduce((sum, p) => sum + p.price * p.qty, 0);
    const fee = subtotal * 0.05; // 5% comisión marketplace
    const total = subtotal + fee;

    root.innerHTML = `
      <div class="cart-items">${items}</div>
      <aside class="cart-summary">
        <h2 class="summary-title">Resumen del pedido</h2>
        <div class="summary-line">
          <span>Subtotal</span>
          <span class="amount">${fmt(subtotal)}</span>
        </div>
        <div class="summary-line">
          <span>Comisión marketplace (5%)</span>
          <span class="amount">${fmt(fee)}</span>
        </div>
        <div class="summary-line">
          <span>Envío / Entrega</span>
          <span class="amount" style="color: var(--green);">Gratis</span>
        </div>
        <div class="summary-line total">
          <span>Total</span>
          <span class="amount">${fmt(total)}</span>
        </div>

        <div style="margin: 1.5rem 0 0.75rem; font-size: 0.9rem; font-weight: 600;">Transfiere el total a esta cuenta</div>
        <div style="background: var(--bg-deep); border: 1px solid var(--line); border-radius: 12px; padding: 1rem; font-size: 0.9rem; line-height: 1.7;">
          <div><strong>Banco:</strong> [NOMBRE DEL BANCO]</div>
          <div><strong>Tipo de cuenta:</strong> [Ahorros / Corriente]</div>
          <div><strong>Número de cuenta:</strong> [0000000000]</div>
          <div><strong>Titular:</strong> [Tu nombre completo]</div>
          <div><strong>Cédula/RUC:</strong> [0000000000]</div>
        </div>

        <div class="field" style="margin-top: 1rem;">
          <label style="font-size: 0.85rem;">Número de comprobante o referencia (opcional)</label>
          <input type="text" id="payment-reference" placeholder="Ej. últimos 4 dígitos, hora de la transferencia…" style="width:100%; padding:0.6rem; border-radius:8px; border:1px solid var(--line); background:var(--bg-deep); color:var(--text);">
        </div>

        <button class="btn btn-primary btn-block btn-lg" onclick="checkout()" style="margin-top: 1.25rem;">
          Ya transferí ${fmt(total)} →
        </button>
        <p style="font-size: 0.8rem; color: var(--text-dim); text-align: center; margin-top: 0.75rem;">
          🔒 Verificaremos tu pago manualmente y confirmaremos tu pedido en breve
        </p>
      </aside>
    `;
  }

  async function checkout() {
    const user = await getCurrentUser();
    if (!user) {
      showToast('Inicia sesión para completar tu compra.');
      setTimeout(() => window.location.href = 'cuenta.html', 1200);
      return;
    }

    const cart = getCart();
    if (cart.length === 0) return;

    const ownProduct = cart.find(item => item.sellerId === user.id);
    if (ownProduct) {
      showToast(`No puedes comprar tu propio producto: "${ownProduct.title}". Elimínalo del carrito para continuar.`);
      return;
    }

    const reference = document.getElementById('payment-reference').value.trim();
    showToast('Registrando tu pedido…');

    for (const item of cart) {
      const { error } = await createOrder({
        productId: item.id,
        sellerId: item.sellerId,
        quantity: item.qty,
        unitPrice: item.price,
        paymentMethod: 'transfer',
        notes: reference,
      });
      if (error) {
        showToast(`Error al crear el pedido: ${error.message}`);
        return;
      }
    }

    setTimeout(() => {
      alert('✓ Pedido registrado como "pendiente de pago".\n\nEn cuanto verifiquemos tu transferencia, confirmaremos el pedido y el vendedor lo preparará.');
      localStorage.removeItem('cc_cart_v2');
      window.location.href = 'index.html';
    }, 800);
  }

  renderCart();
</script>
</body>
</html>
