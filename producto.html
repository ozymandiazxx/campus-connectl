<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto — Campus Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="grid-bg"></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <span class="logo-mark">C</span>
      <span>Campus<span style="color: var(--cyan)">Connect</span></span>
    </a>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="explorar.html">Explorar</a>
      <a href="vender.html">Vender</a>
      <a href="index.html#como-funciona">¿Cómo funciona?</a>
    </div>
    <div class="nav-actions">
      <a href="cuenta.html" class="btn btn-ghost">Mi cuenta</a>
      <a href="carrito.html" class="cart-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="breadcrumb" style="padding-top: 2rem;">
    <a href="index.html">Inicio</a> / <a href="explorar.html">Explorar</a> / <span id="bc-cat"></span>
  </div>

  <div class="product-detail" id="detail-root">
    <!-- Filled by JS -->
  </div>

  <section style="margin-top: 3rem; padding-bottom: 4rem;">
    <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">Productos <em>relacionados</em></h2>
    <div class="products-grid-3" id="related-grid"></div>
  </section>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 Campus Connect S.A.S.</span>
      <span>Quito · Ecuador</span>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="app.js"></script>
<script src="cookies.js"></script>
<script src="chat.js"></script>
<script>
  async function openProductChat() {
    const p = window.currentProduct;
    const conversationId = await openOrCreateConversation(p.sellerId, p.id);
    if (conversationId) renderChatModal(conversationId, p.title, p.seller);
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const raw = id ? await fetchProductById(id) : null;

    if (!raw) {
      document.getElementById('detail-root').innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1;"><div class="icon">🔍</div><h3>Producto no encontrado</h3>
        <a href="explorar.html" class="btn btn-primary" style="margin-top:1.5rem;">Volver a explorar</a></div>`;
      return;
    }

    const product = normalizeProduct(raw);
    window.currentProduct = product;

    document.getElementById('bc-cat').textContent = product.category;
    document.title = `${product.title} — Campus Connect`;

    const images = product.imageUrls.length > 0 ? product.imageUrls : null;

    document.getElementById('detail-root').innerHTML = `
      <div class="product-gallery">
        <div class="gallery-main" id="gallery-main">
          ${images ? `<img src="${images[0]}" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;">` : product.icon}
        </div>
        <div class="gallery-thumbs">
          ${images
            ? images.map((url, i) => `<div class="gallery-thumb" onclick="document.getElementById('gallery-main').innerHTML='<img src=&quot;${url}&quot; style=&quot;width:100%;height:100%;object-fit:cover;border-radius:inherit;&quot;>'"><img src="${url}" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;"></div>`).join('')
            : `<div class="gallery-thumb">${product.icon}</div><div class="gallery-thumb">📦</div><div class="gallery-thumb">🔍</div><div class="gallery-thumb">📐</div>`}
        </div>
      </div>
      <div>
        <div class="detail-eyebrow">${product.category} · ${product.university}</div>
        <h1 class="detail-title">${product.title}</h1>
        <div class="detail-price">${fmt(product.price)}</div>
        <div class="detail-price-meta">Precio en dólares · Sin costos ocultos</div>

        <div class="detail-seller">
          <div class="seller-avatar">${(product.seller || '?').charAt(0)}</div>
          <div style="flex: 1;">
            <div class="seller-name">${product.seller}</div>
            <div class="seller-meta">Vendedor · ${product.university} · ★ ${Number(product.sellerRating).toFixed(1)}</div>
          </div>
          <button class="btn btn-ghost" style="font-size: 0.85rem; padding: 0.5rem 0.85rem;" onclick="openProductChat()">Mensaje</button>
        </div>

        <div class="detail-actions">
          <button class="btn btn-primary" style="flex: 1;" onclick="addToCart(window.currentProduct)">
            🛒 Añadir al carrito
          </button>
          <button class="btn btn-ghost" onclick="addToCart(window.currentProduct); window.location.href='carrito.html'">
            Comprar ahora
          </button>
        </div>

        <div class="detail-desc">
          <h3>Descripción</h3>
          <p>${product.description}</p>
        </div>
      </div>
    `;

    const related = await fetchRelatedProducts(product.categoryId, product.id, 3);
    document.getElementById('related-grid').innerHTML = related.map(normalizeProduct).map(renderProductCard).join('');
  }

  init();
</script>
</body>
</html>
