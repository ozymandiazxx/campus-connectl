<head>

<link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="nav-actions">

<header class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a href="index.html">Inicio</a> / <span>Explorar</span>
    </div>
    <h1>Explora el <em>marketplace</em></h1>
  </div>
</header>

<div class="container">
  <div class="explore-layout">
    <!-- FILTERS -->
    <aside class="filters">
      <div class="filter-group">
        <h4 class="filter-title">Categoría</h4>
        <ul class="filter-list" id="filter-cat"></ul>
      </div>
      <div class="filter-group">
        <h4 class="filter-title">Universidad</h4>
        <ul class="filter-list" id="filter-uni"></ul>
      </div>
      <div class="filter-group">
        <h4 class="filter-title">Rango de precio</h4>
        <div class="price-range">
          <input type="number" id="price-min" placeholder="Mín">
          <input type="number" id="price-max" placeholder="Máx">
        </div>
      </div>
      <button class="btn btn-ghost btn-block" id="clear-filters" style="margin-top: 1rem;">Limpiar filtros</button>
    </aside>

    <!-- RESULTS -->
    <div>
      <div class="results-bar">
        <span class="results-count" id="results-count"></span>
        <select class="sort-select" id="sort-select">
          <option value="featured">Destacados</option>
          <option value="price-asc">Precio: menor a mayor</option>
          <option value="price-desc">Precio: mayor a menor</option>
          <option value="alpha">A–Z</option>
        </select>
      </div>
      <div class="products-grid-3" id="results-grid"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 Campus Connect S.A.S.</span>
      <span>Quito · Ecuador</span>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="app.js"></script>
<script src="cookies.js"></script>
<script>
  const normalize = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

  function getFilters() {
    return {
      cats: [...document.querySelectorAll('.f-cat:checked')].map(c => c.value),
      unis: [...document.querySelectorAll('.f-uni:checked')].map(c => c.value),
      min: parseFloat(document.getElementById('price-min').value) || null,
      max: parseFloat(document.getElementById('price-max').value) || null,
      search: document.getElementById('search-input').value.trim(),
      sort: document.getElementById('sort-select').value,
    };
  }

  async function applyFilters() {
    const f = getFilters();
    const products = await fetchProducts({ minPrice: f.min, maxPrice: f.max, search: f.search, sort: f.sort });

    let list = products.map(normalizeProduct).filter(p =>
      (f.cats.length === 0 || f.cats.includes(p.category)) &&
      (f.unis.length === 0 || f.unis.includes(p.university))
    );

    document.getElementById('results-count').textContent = `${list.length} resultados`;
    const grid = document.getElementById('results-grid');
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><div class="icon">🔍</div><h3>Sin resultados</h3><p>Intenta ajustar los filtros</p></div>';
    } else {
      grid.innerHTML = list.map(renderProductCard).join('');
    }
  }

  async function initFilters() {
    const [categories, universities] = await Promise.all([fetchCategories(), fetchUniversities()]);

    document.getElementById('filter-cat').innerHTML = categories.map(c =>
      `<li><label><input type="checkbox" value="${c.name}" class="f-cat"> ${c.icon || ''} ${c.name}</label></li>`
    ).join('');
    document.getElementById('filter-uni').innerHTML = universities.map(u =>
      `<li><label><input type="checkbox" value="${u.short_name}" class="f-uni"> ${u.short_name}</label></li>`
    ).join('');

    // Preselecciona categoría desde el query param (?cat=Libros)
    const urlParams = new URLSearchParams(window.location.search);
    const initialCat = urlParams.get('cat');
    if (initialCat) {
      const match = categories.find(c => normalize(c.slug).includes(normalize(initialCat)) || normalize(c.name).includes(normalize(initialCat)));
      if (match) {
        const cb = document.querySelector(`.f-cat[value="${match.name}"]`);
        if (cb) cb.checked = true;
      }
    }

    document.querySelectorAll('.f-cat, .f-uni').forEach(el => el.addEventListener('change', applyFilters));
    applyFilters();
  }

  document.getElementById('price-min').addEventListener('input', applyFilters);
  document.getElementById('price-max').addEventListener('input', applyFilters);
  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('sort-select').addEventListener('change', applyFilters);
  document.getElementById('clear-filters').addEventListener('click', () => {
    document.querySelectorAll('.f-cat, .f-uni').forEach(c => c.checked = false);
    document.getElementById('price-min').value = '';
    document.getElementById('price-max').value = '';
    document.getElementById('search-input').value = '';
    applyFilters();
  });

  initFilters();
</script>
</body>
</html>
